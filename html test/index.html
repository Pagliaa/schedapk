<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="div-title">
        <div class="div-data">
            <div class="full">
                <button class="btn-noborder" onclick="poke_list()">
                    <span id="pokename" class="spa-dex spa-dexname">Bulbasaur</span>
                    <span id="pokenr" class="spa-dex spa-dexnr"># 001</span>
                </button>
            </div>
            <div class="full">
                <button class="btn-noborder" onclick="poke_list()">
                    <span id="type1" class="spa-type type-typeless">???</span>
                    <span id="type2" class="spa-type type-typeless hidden">???</span>
                </button>
            </div>
            <div id="popupPokeList" class="popup hidden">
                <ul id="pokeList">
                </ul>
            </div>
            <!-- <input type="text" name="pk_name" class="inp-dex inp-dexname" placeholder="Bulbasaur">
            <input type="text" name="dex_nr" class="inp-dex inp-dexnr" placeholder="# 001" oninput="dexpre(this)"> -->
        </div>
        <div class="div-propic">
            <button class="btn-noborder" onclick="img_change()">
                <img src="" id="poke-img" class="img-propic"
                    onerror="this.src='https://archives.bulbagarden.net/media/upload/1/14/Ten_Question_Marks_III.png'">
            </button>
        </div>
    </div>

    <!-- Script -->
    <script src="js/app.js"></script>

</html>
